async function syncToGitHub(){
  let token=localStorage.getItem('gh_sync_token')||'';
  token=prompt('GitHub Personal Access Token（留空取消）：',token);
  if(!token)return;
  localStorage.setItem('gh_sync_token',token);
  const H={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  const state={pinned:listings.filter(l=>l.pinned).map(l=>l.id),dismissed:listings.filter(l=>l.dismissed).map(l=>l.id),updated:new Date().toISOString()};
  try{
    const ex=await fetch('https://api.github.com/repos/ran40453/rental-tracker/contents/user_state.json',{headers:H}).then(r=>r.json()).catch(()=>({}));
    const body={message:'sync: update user state',content:btoa(unescape(encodeURIComponent(JSON.stringify(state,null,2))))};
    if(ex.sha)body.sha=ex.sha;
    const r=await fetch('https://api.github.com/repos/ran40453/rental-tracker/contents/user_state.json',{method:'PUT',headers:H,body:JSON.stringify(body)});
    const d=await r.json();
    if(d.commit)alert('✅ 同步成功！釘選'+state.pinned.length+'筆，已移除'+state.dismissed.length+'筆');
    else alert('❌ 同步失敗：'+JSON.stringify(d).slice(0,200));
  }catch(e){alert('❌ 同步失敗：'+e.message);}
}

(async()=>{
  const [r591, rfb] = await Promise.all([
    fetch('data_591.json').then(r=>r.json()).catch(()=>[]),
    fetch('data_fb.json').then(r=>r.json()).catch(()=>[])
  ]);
  const merged = [...r591, ...rfb];
  const stored = JSON.parse(localStorage.getItem('rental_listings_v4')||null);
  if(stored){
    // ä¿çä½¿ç¨èçéé¸/ç§»é¤çæï¼åææ¥åæ°è³æ
    const storedMap = new Map(stored.map(x=>[x.id,x]));
    listings = merged.map(x => storedMap.has(x.id)
      ? {...x, pinned:storedMap.get(x.id).pinned, dismissed:storedMap.get(x.id).dismissed}
      : x);
    // ä¿çä½¿ç¨èæåæ°å¢çç©ä»¶ï¼id ä¸å¨ merged è£¡ï¼
    const mergedIds = new Set(merged.map(x=>x.id));
    stored.filter(x=>!mergedIds.has(x.id)).forEach(x=>listings.push(x));
  } else {
    listings = merged;
  }
  nextId = listings.reduce((m,l)=>Math.max(m,l.id),0)+1;
  render();
})();
